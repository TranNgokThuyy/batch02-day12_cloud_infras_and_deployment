name: Day 12 CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/day12-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "06-lab-complete/**"
      - ".github/workflows/day12-ci-cd.yml"
  workflow_dispatch:

env:
  PROJECT_DIR: 06-lab-complete
  RAILWAY_PROJECT_ID: 0b28c4c2-0267-43d6-825f-daab8f6594f5
  RAILWAY_SERVICE: agent
  RAILWAY_ENVIRONMENT: production
  PUBLIC_URL: https://agent-production-df3b.up.railway.app

jobs:
  ci:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile Python modules
        working-directory: ${{ env.PROJECT_DIR }}
        run: python -m compileall app utils check_production_ready.py

      - name: Production readiness check
        working-directory: ${{ env.PROJECT_DIR }}
        run: python check_production_ready.py

      - name: Validate Docker Compose config
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose config --quiet

      - name: Build Docker image
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker build -t day12-agent:ci .

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Railway service
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing GitHub secret RAILWAY_TOKEN"
            exit 1
          fi

          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --detach \
            --yes \
            --message "GitHub Actions deploy $GITHUB_SHA"

      - name: Wait for Railway deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          for attempt in $(seq 1 30); do
            railway deployment list \
              --project "$RAILWAY_PROJECT_ID" \
              --service "$RAILWAY_SERVICE" \
              --environment "$RAILWAY_ENVIRONMENT" \
              --json > deployments.json

            status=$(python -c "import json; print(json.load(open('deployments.json'))[0]['status'])")
            echo "Latest deployment status: $status"

            if [ "$status" = "SUCCESS" ]; then
              exit 0
            fi

            if [ "$status" = "FAILED" ] || [ "$status" = "CRASHED" ]; then
              railway logs \
                --project "$RAILWAY_PROJECT_ID" \
                --service "$RAILWAY_SERVICE" \
                --environment "$RAILWAY_ENVIRONMENT" \
                --deployment \
                --lines 120 || true
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Railway deployment"
          exit 1

      - name: Public health smoke test
        run: |
          curl --fail --show-error --silent "$PUBLIC_URL/health"
          curl --fail --show-error --silent "$PUBLIC_URL/ready"

      - name: Optional authenticated smoke test
        env:
          DEPLOYED_API_KEY: ${{ secrets.DEPLOYED_API_KEY }}
        run: |
          if [ -z "$DEPLOYED_API_KEY" ]; then
            echo "Skipping authenticated smoke test because DEPLOYED_API_KEY is not set"
            exit 0
          fi

          curl --fail --show-error --silent \
            -X POST "$PUBLIC_URL/ask" \
            -H "X-API-Key: $DEPLOYED_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"user_id":"github-actions","question":"health check"}'
